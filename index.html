<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJDH Shanghai Emoji Dash</title>
    <style>
        :root {
            --bg-color: #FFF0F5;
            --hit-pink: #FF1493;
            --miss-blue: #ADD8E6;
            --shanghai-dark: #0f0c29;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: #333; font-family: "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
            overflow: hidden; touch-action: none;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        /* 舞台与上海 Emoji 天际线 */
        #stage {
            flex: 1; position: relative;
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex; justify-content: center; align-items: flex-end;
            overflow: hidden;
        }
        
        #skyline-emoji {
            position: absolute; bottom: 0; width: 100%; height: 120px;
            display: flex; justify-content: space-around; align-items: flex-end;
            font-size: 80px; opacity: 0.4; pointer-events: none; z-index: 1;
        }

        #character-wrapper {
            position: relative; display: flex; justify-content: center; align-items: flex-end;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
            font-size: 80px; margin-bottom: 5px;
        }
        
        /* 能量条 */
        #energy-section {
            position: absolute; left: 15px; bottom: 20px;
            display: flex; flex-direction: column; align-items: center; z-index: 20;
        }
        #groom-cheer { font-size: 40px; margin-bottom: 5px; }
        #energy-bar-container {
            width: 15px; height: 100px; border: 2px solid white;
            background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; position: relative;
        }
        #energy-fill {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: linear-gradient(to top, #FF69B4, #00FFCC);
            box-shadow: 0 0 10px #FF69B4; transition: height 0.2s;
        }

        /* 节奏轨道区 */
        #rhythm-area {
            height: 50%; position: relative; display: flex;
            background: rgba(255, 255, 255, 0.95); border-top: 4px solid var(--hit-pink);
        }
        .track { width: 25%; height: 100%; border-right: 1px dashed #FFB6C1; position: relative; }
        .hit-zone {
            position: absolute; bottom: 50px; width: 100%; height: 80px;
            background: rgba(255, 20, 147, 0.05); border-top: 2px solid var(--hit-pink);
        }
        .note { 
            position: absolute; width: 100%; text-align: center;
            font-size: 40px; z-index: 5; transform: translateY(-50%);
        }

        /* Hit & Miss 特效 */
        .hit-effect {
            position: absolute; width: 100%; text-align: center; bottom: 60px;
            font-size: 50px; pointer-events: none; z-index: 50;
            animation: hit-pop 0.4s ease-out forwards;
        }
        @keyframes hit-pop {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }

        .miss-text {
            position: absolute; width: 100%; text-align: center; bottom: 20px;
            color: var(--miss-blue); font-weight: bold; font-size: 18px;
            pointer-events: none; z-index: 50;
            animation: miss-fade 0.5s ease-out forwards;
        }
        @keyframes miss-fade {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }

        /* 蒙层 */
        #finish-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .jjdh-text {
            font-size: 80px; font-weight: 900; color: var(--hit-pink);
            text-shadow: 3px 3px 0px var(--accent-color);
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        #start-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: var(--shanghai-dark); z-index: 200; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }
        .btn {
            padding: 15px 40px; font-size: 18px; background: var(--hit-pink); color: white;
            border: none; border-radius: 30px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 0 #C71585;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <div style="font-size: 60px; margin-bottom: 20px;">👰🤵</div>
    <h1 style="color:var(--hit-pink)">JJDH</h1>
    <p>JinJin 💖 TaoTao</p>
    <button class="btn" onclick="startGame()">start</button>
</div>

<div id="game-container">
    <div id="stage">
        <div id="skyline-emoji">
            <span>🏙️</span><span style="font-size: 110px;">🗼</span><span>🏢</span><span>🌃</span>
        </div>

        <div id="energy-section">
            <div id="groom-cheer">🤵</div>
            <div id="energy-bar-container"><div id="energy-fill"></div></div>
        </div>
        <div id="character-wrapper">
            <span id="bride-main">👰</span>
            <span id="groom-final" style="display:none; margin-left: -20px;">🤵</span>
        </div>
    </div>
    
    <div id="rhythm-area">
        <div class="track" data-idx="0"><div class="hit-zone"></div></div>
        <div class="track" data-idx="1"><div class="hit-zone"></div></div>
        <div class="track" data-idx="2"><div class="hit-zone"></div></div>
        <div class="track" data-idx="3"><div class="hit-zone"></div></div>
    </div>
    
    <div id="finish-overlay">
        <div style="font-size: 50px;">🎊💖🎊</div>
        <div class="jjdh-text">JJDH</div>
        <button class="btn" onclick="location.reload()">Welcome you!!!</button>
    </div>
</div>

<script>
    const items = ['💍', '🎂', '🌸', '🧧'];
    const tracks = document.querySelectorAll('.track');
    const energyFill = document.getElementById('energy-fill');
    const characterWrapper = document.getElementById('character-wrapper');
    const brideMain = document.getElementById('bride-main');
    const groomFinal = document.getElementById('groom-final');
    const groomCheer = document.getElementById('groom-cheer');
    const finishOverlay = document.getElementById('finish-overlay');

    let energy = 0;
    let gameActive = false;
    let notes = [];
    const speed = 5.5;

    // --- 8-bit 瓦格纳《婚礼进行曲》 ---
    let audioCtx = null;
    function playWagnerMarch() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const wagner = [
            {f: 392.00, d: 0.4}, {f: 523.25, d: 0.4}, {f: 523.25, d: 0.2}, {f: 523.25, d: 0.2}, 
            {f: 392.00, d: 0.4}, {f: 587.33, d: 0.4}, {f: 493.88, d: 0.2}, {f: 523.25, d: 0.2}
        ];
        let i = 0;
        function playNote() {
            if (!gameActive) return;
            const note = wagner[i % wagner.length];
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + note.d);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + note.d);
            i++; setTimeout(playNote, note.d * 1000 + 50);
        }
        playNote();
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        playWagnerMarch();
        spawnNote();
        update();
    }

    function spawnNote() {
        if (!gameActive) return;
        const trackIdx = Math.floor(Math.random() * 4);
        const itemEmoji = items[Math.floor(Math.random() * items.length)];
        const noteEl = document.createElement("div");
        noteEl.className = "note";
        noteEl.innerText = itemEmoji;
        tracks[trackIdx].appendChild(noteEl);
        notes.push({ el: noteEl, y: -50, track: trackIdx, hit: false, missed: false });
        setTimeout(spawnNote, 450 + Math.random() * 600);
    }

    function update() {
        if (gameActive || energy >= 100) {
            const bottomLine = window.innerHeight * 0.5;
            notes.forEach((note, index) => {
                note.y += speed;
                note.el.style.top = note.y + 'px';
                
                if (note.y > bottomLine - 30 && !note.hit && !note.missed) {
                    note.missed = true;
                    showFeedback(note.track, 'miss');
                }
                if (note.y > bottomLine) {
                    note.el.remove();
                    notes.splice(index, 1);
                }
            });
            const time = Date.now() / 150;
            if (gameActive) {
                brideMain.style.transform = `rotate(${Math.sin(time) * 10}deg)`;
                groomCheer.style.transform = `scale(${1 + Math.sin(time) * 0.2})`;
            }
        }
        requestAnimationFrame(update);
    }

    function showFeedback(trackIdx, type) {
        const trackEl = tracks[trackIdx];
        if (type === 'hit') {
            const hitEl = document.createElement("div");
            hitEl.className = "hit-effect";
            hitEl.innerText = "💖";
            trackEl.appendChild(hitEl);
            setTimeout(() => hitEl.remove(), 400);
        } else if (type === 'miss') {
            const missEl = document.createElement("div");
            missEl.className = "miss-text";
            missEl.innerText = "MISS";
            trackEl.appendChild(missEl);
            setTimeout(() => missEl.remove(), 500);
        }
    }

    function handleInput(trackIdx) {
        if (!gameActive) return;
        const hitZoneTop = window.innerHeight * 0.5 - 130;
        const hitZoneBottom = window.innerHeight * 0.5 - 30;

        for (let i = 0; i < notes.length; i++) {
            const note = notes[i];
            if (note.track === trackIdx && !note.hit && note.y > hitZoneTop && note.y < hitZoneBottom) {
                note.hit = true;
                showFeedback(trackIdx, 'hit');
                note.el.remove();
                notes.splice(i, 1);
                energy += 4;
                energyFill.style.height = Math.min(energy, 100) + '%';
                if (energy >= 100) triggerWin();
                return;
            }
        }
    }

    function triggerWin() {
        gameActive = false;
        document.getElementById('energy-section').style.opacity = '0';
        groomFinal.style.display = 'inline';
        characterWrapper.classList.add('win-scene');
        setTimeout(() => { finishOverlay.style.display = 'flex'; }, 2000);
    }

    tracks.forEach((t, idx) => {
        t.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(idx); });
        t.addEventListener('mousedown', () => handleInput(idx));
    });
</script>
</body>
</html>
